{# partials/_notif_row.html #}
<div style="display:flex;align-items:center;justify-content:space-between;
            padding:14px 0;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;">
  <div>
    <div style="font-size:13.5px;font-weight:700;color:var(--text);">{{ label }}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px;">{{ sub }}</div>
  </div>
  <label class="toggle-switch" style="flex-shrink:0;">
    <input type="checkbox" name="{{ name }}" value="1" {% if checked %}checked{% endif %}>
    <span class="toggle-slider"></span>
  </label>
</div>
