{# partials/_billing_usage.html #}
<div style="margin-bottom:16px;">
  <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
    <span style="font-size:12.5px;font-weight:700;color:var(--text);">{{ label }}</span>
    <span style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;">
      {{ used }} / {% if limit == 0 %}—{% else %}{{ limit }}{% if unit %} {{ unit }}{% endif %}{% endif %}
    </span>
  </div>
  <div style="height:6px;background:var(--border);border-radius:10px;overflow:hidden;">
    {% if limit > 0 %}
      {% widthratio used limit 100 as pct %}
      <div style="height:100%;width:{{ pct }}%;border-radius:10px;transition:width .4s;
        background:{% if pct >= 90 %}var(--danger){% elif pct >= 70 %}var(--accent2){% else %}var(--brand){% endif %};">
      </div>
    {% else %}
      <div style="height:100%;width:0%;background:var(--border);border-radius:10px;"></div>
    {% endif %}
  </div>
</div>
